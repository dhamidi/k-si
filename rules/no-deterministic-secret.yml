id: no-deterministic-secret
language: go
severity: error
message: Mint secrets/tokens with crypto/rand, never fmt.Sprintf or string concatenation from an id — a deterministic completion token is guessable, and a guessable capability is a leak. The real edge mints from crypto/rand (see cmd/kasi/serve.go mintToken; docs/04, docs/13). Test scaffolding that only needs a stable value is scoped out below.
# Sim scaffolding is allowed to mint deterministic tok- values (scenarios extract
# the token via `click`, so it only needs to be stable, not unguessable):
# cmd/kasi/vocab.go, any *_sim.go twin, and the t/ scenario tree.
ignores:
  - 'cmd/kasi/vocab.go'
  - '**/*_sim.go'
  - 't/**'
rule:
  any:
    # fmt.Sprintf whose format string is a secret/token prefix literal
    - pattern: fmt.Sprintf($FMT, $$$)
    - pattern: fmt.Sprintf($FMT)
    # string concatenation minting a secret/token from a prefix literal
    - all:
        - pattern: $A + $B
        - regex: '(?i)"(tok|token|secret|key)[-_]'
constraints:
  FMT:
    regex: '(?i)^"(tok|token|secret|key)[-_]'
